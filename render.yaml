services:
  - type: web
    name: task-manager-backend
    runtime: docker
    repo: https://github.com/your-username/task-manager-app
    rootDir: backend
    branch: main
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
